name: exterior

on:
  push:

jobs:
  Marxist:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        junior: ["inevitable", "forbid", "adventure", "identical", "France"]
        brute: ["demonstrate", "resistance", "incentive", "acquire"]
    steps:
    - uses: actions/checkout@v6
    - uses: actions/setup-java@v5
      with:
        distribution: 'zulu'
        java-version: '25'
    - run: java --enable-native-access=ALL-UNNAMED -jar Cm.jar
